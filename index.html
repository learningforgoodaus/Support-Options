<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Support - Workplace Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-bg-purple: #C6B4D9;
            --color-primary-purple: #513873;
            --color-dark-purple: #413659;
            --color-light-grey: #f6f5f8; 
            --color-accent-purple: #9C7F9D;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: var(--color-light-grey);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .learning-activity-container {
            position: relative;
            width: 800px; 
            height: 650px;
            background-color: var(--color-bg-purple);
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(65, 54, 89, 0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .top-instructions {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            color: var(--color-primary-purple);
            font-weight: 700;
            font-size: 1.1rem;
            z-index: 20;
            padding: 0 20px;
        }

        .large-circle {
            width: 440px;
            height: 440px;
            background-color: var(--color-white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 45px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        .large-circle h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-primary-purple);
            margin-bottom: 0.5rem;
        }

        .small-circle {
            position: absolute;
            width: 110px;
            height: 110px;
            background-color: var(--color-primary-purple);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.2;
            padding: 12px;
            box-sizing: border-box;
            pointer-events: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .small-circle.active {
            background-color: var(--color-accent-purple);
            width: 130px;
            height: 130px;
            border: 4px solid var(--color-dark-purple);
        }

        #small-circles-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        /* --- MOBILE REFINEMENTS --- */
        @media (max-width: 850px) {
            .learning-activity-container {
                width: 96vw;
                height: 85vh;
                min-height: 580px;
                border-radius: 1.5rem;
            }
            .large-circle {
                width: 280px;
                height: 280px;
                padding: 25px;
            }
            .large-circle h2 { font-size: 1.1rem; }
            .large-circle p { font-size: 0.8rem; line-height: 1.4; }

            .small-circle {
                width: 95px !important;
                height: 95px !important;
                font-size: 0.75rem;
                padding: 8px;
            }
            .small-circle.active {
                width: 110px !important;
                height: 110px !important;
            }
            .top-instructions { 
                font-size: 0.85rem; 
                top: 15px; 
                line-height: 1.2;
            }
        }
    </style>
</head>
<body>

<div class="learning-activity-container">
    <div class="top-instructions">Select a satellite circle to explore support options.</div>
    
    <div id="large-circle" class="large-circle">
        <h2 id="large-circle-title">Internal Support</h2>
        <p id="large-circle-text">Workplaces have specific tools to help colleagues stay safe and keep their jobs.</p>
    </div>

    <div id="small-circles-wrapper"></div>
</div>

<script>
    const sectionsData = [
        { id: 'm', title: 'Managers', content: 'Managers can provide immediate practical support. They can arrange shift changes and secure priority parking.' },
        { id: 'e', title: 'EAP', content: 'The Employee Assistance Program (EAP) offers free, private, and professional counselling for all staff members.' },
        { id: 'h', title: 'HR Support', content: 'HR can guide staff through entitlements. All Australian employees have access to 10 days of paid domestic violence leave.' }
    ];

    const wrapper = document.getElementById('small-circles-wrapper');
    const titleEl = document.getElementById('large-circle-title');
    const textEl = document.getElementById('large-circle-text');
    const container = document.querySelector('.learning-activity-container');
    let activeCircleId = null;

    function renderCircles() {
        const isMobile = window.innerWidth <= 850;
        const centerX = container.offsetWidth / 2;
        const centerY = container.offsetHeight / 2;
        
        const largeCircle = document.getElementById('large-circle');
        const largeR = largeCircle.offsetWidth / 2;
        
        const activeIndex = sectionsData.findIndex(s => s.id === activeCircleId);

        sectionsData.forEach((section, index) => {
            const el = document.getElementById(`circle-${section.id}`);
            const isActive = section.id === activeCircleId;
            const smallR = el.offsetWidth / 2;

            // MATHEMATICAL FIX: 
            // On mobile, we significantly reduce orbit padding so the "arc" stays inside the 96vw width.
            const orbitPadding = isMobile ? 12 : 45;
            const orbit = largeR + smallR + orbitPadding;

            let angle;
            const STEP = isMobile ? 50 : 38; // Wider spread on mobile for easier tapping
            const RIGHT_START = isMobile ? 30 : 45; 
            const LEFT_START = 135;

            // Logic to keep them on one side or the other based on selection
            if (activeCircleId === null) {
                angle = RIGHT_START - (index * STEP);
            } else if (index <= activeIndex) {
                angle = LEFT_START + (index * STEP);
            } else {
                const relIndex = index - (activeIndex + 1);
                angle = RIGHT_START - (relIndex * STEP);
            }

            const rad = angle * (Math.PI / 180);
            
            // Positioning via Left/Top for better stability in LMS iframes
            const x = centerX + orbit * Math.cos(rad) - smallR;
            const y = centerY - orbit * Math.sin(rad) - smallR;

            el.style.left = `${x}px`;
            el.style.top = `${y}px`;

            if (isActive) el.classList.add('active');
            else el.classList.remove('active');
        });
    }

    // Build circles once
    sectionsData.forEach(s => {
        const div = document.createElement('div');
        div.id = `circle-${s.id}`;
        div.className = 'small-circle';
        div.innerHTML = `<span>${s.title}</span>`;
        div.onclick = () => {
            activeCircleId = s.id;
            titleEl.textContent = s.title;
            textEl.textContent = s.content;
            renderCircles();
        };
        wrapper.appendChild(div);
    });

    // Handle Xen/LMS loading delay
    window.onload = () => setTimeout(renderCircles, 150);
    window.onresize = renderCircles;
</script>

</body>
</html>
