<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Support - Workplace Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-bg-purple: #C6B4D9;
            --color-primary-purple: #513873;
            --color-dark-purple: #413659;
            --color-light-grey: #f6f5f8; 
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: var(--color-light-grey);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .learning-activity-container {
            position: relative;
            width: 800px; 
            height: 650px;
            background-color: var(--color-bg-purple);
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(65, 54, 89, 0.25);
            overflow: hidden;
        }

        .top-instructions {
            position: absolute;
            top: 25px;
            width: 100%;
            text-align: center;
            color: var(--color-primary-purple);
            font-weight: 700;
            font-size: 1.1rem;
            z-index: 20;
            padding: 0 20px;
        }

        .large-circle {
            width: 420px;
            height: 420px;
            background-color: var(--color-white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .small-circle {
            position: absolute;
            width: 120px; /* PC Size */
            height: 120px;
            background-color: var(--color-primary-purple);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-size: 0.85rem;
            font-weight: 600;
            line-height: 1.2;
            padding: 15px;
            box-sizing: border-box;
        }

        .small-circle.active {
            background-color: var(--color-dark-purple);
            width: 140px;
            height: 140px;
            border: 3px solid white;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
        }

        /* --- MOBILE OPTIMISATION --- */
        @media (max-width: 768px) {
            .learning-activity-container {
                width: 96vw;
                height: 92vh;
                min-height: 620px;
            }

            .large-circle {
                width: 260px !important; /* Smaller center to make room */
                height: 260px !important;
                padding: 25px;
            }

            .large-circle h2 { font-size: 1.1rem !important; margin-bottom: 0.5rem; }
            .large-circle p { font-size: 0.85rem !important; line-height: 1.4; }

            .small-circle {
                width: 105px !important; /* Larger mobile circles to fit text */
                height: 105px !important;
                font-size: 0.75rem !important;
                padding: 10px !important;
            }

            .small-circle.active {
                width: 115px !important;
                height: 115px !important;
            }

            .top-instructions {
                font-size: 0.9rem;
                top: 15px;
            }
        }
    </style>
</head>
<body>

<div class="learning-activity-container">
    <div class="top-instructions">Select a heading to explore support options</div>
    
    <div id="large-circle" class="large-circle">
        <h2 id="title" class="text-xl font-bold text-[var(--color-primary-purple)]">Internal Support</h2>
        <p id="text" class="text-gray-700">Workplaces have specific tools to help survivors stay safe and keep their jobs.</p>
    </div>

    <div id="wrapper"></div>
</div>

<script>
    const sections = [
        { id: 'm', title: 'Supportive Managers', content: 'Managers can provide immediate practical support. They can arrange shift changes and secure priority parking.' },
        { id: 'h', title: 'Human Resources', content: 'HR can guide staff through entitlements. All Australian employees have access to 10 days of paid domestic violence leave annually.' },
        { id: 'e', title: 'Counselling (EAP)', content: 'The Employee Assistance Program (EAP) offers free, private, and professional counselling for all staff needing support.' }
    ];

    const wrapper = document.getElementById('wrapper');
    const titleEl = document.getElementById('title');
    const textEl = document.getElementById('text');
    let activeId = null;

    function updateLayout() {
        const container = document.querySelector('.learning-activity-container');
        const isMobile = window.innerWidth <= 768;
        const centerX = container.offsetWidth / 2;
        const centerY = container.offsetHeight / 2;
        
        const largeCircle = document.getElementById('large-circle');
        const largeR = largeCircle.offsetWidth / 2;

        sections.forEach((s, i) => {
            const el = document.getElementById(s.id);
            const smallR = el.offsetWidth / 2;
            
            // INCREASED PADDING: Ensures they don't cover the white center
            const padding = isMobile ? 35 : 45; 
            const orbit = largeR + smallR + padding;

            let angle;
            if (isMobile) {
                // Vertical spread: One at top, two at bottom-left/right
                const mobileAngles = [90, 215, 325]; 
                angle = mobileAngles[i];
            } else {
                // Desktop Arc
                angle = 45 - (i * 45); 
            }

            const rad = angle * (Math.PI / 180);
            const x = centerX + orbit * Math.cos(rad) - smallR;
            const y = centerY - orbit * Math.sin(rad) - smallR;

            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
        });
    }

    // Build the circles
    sections.forEach(s => {
        const btn = document.createElement('div');
        btn.id = s.id;
        btn.className = 'small-circle';
        btn.innerHTML = `<span>${s.title}</span>`;
        btn.onclick = () => {
            activeId = s.id;
            titleEl.innerText = s.title;
            textEl.innerText = s.content;
            document.querySelectorAll('.small-circle').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
            updateLayout();
        };
        wrapper.appendChild(btn);
    });

    // Handle Xen loading delay and resizing
    window.onload = () => setTimeout(updateLayout, 150);
    window.onresize = updateLayout;
</script>

</body>
</html>
