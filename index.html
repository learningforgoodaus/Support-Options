<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Support - Workplace Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --color-bg-purple: #C6B4D9;
            --color-primary-purple: #513873;
            --color-dark-purple: #413659;
            --color-light-grey: #f6f5f8; 
            --color-accent-purple: #9C7F9D;
            --color-white: #FFFFFF;
        }

        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: var(--color-light-grey);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Main container */
        .learning-activity-container {
            position: relative;
            width: 800px; 
            height: 650px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--color-bg-purple);
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(65, 54, 89, 0.25);
        }

        /* Top instructions text */
        .top-instructions {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            color: var(--color-primary-purple);
            font-weight: 700;
            font-size: 1.1rem;
            padding: 0 20px;
            z-index: 20;
        }

        /* Central circle */
        .large-circle {
            width: 440px;
            height: 440px;
            background-color: var(--color-white);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            transition: all 0.5s ease-in-out;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--color-dark-purple);
            line-height: 1.5;
            box-sizing: border-box;
            z-index: 1;
            text-align: center;
        }

        .large-circle h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--color-primary-purple);
        }

        /* Individual small circles */
        .small-circle {
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: var(--color-primary-purple);
            color: var(--color-white);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        width 0.3s ease, height 0.3s ease,
                        background-color 0.3s ease, border 0.3s ease;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 12px;
            box-sizing: border-box;
            line-height: 1.2;
            z-index: 10;
        }

        .small-circle.active {
            width: 120px;
            height: 120px;
            border: 4px solid var(--color-dark-purple);
            background-color: var(--color-accent-purple);
        }

        #small-circles-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* Mobile adjustments */
        @media (max-width: 850px) {
            .learning-activity-container {
                width: 95vw;
                height: 85vh;
                min-height: 580px;
            }
            .large-circle {
                width: 280px;
                height: 280px;
                padding: 25px;
            }
            .large-circle h2 { font-size: 1.1rem; }
            .large-circle p { font-size: 0.85rem; }
            
            .small-circle {
                width: 95px !important; /* Force size to fit text */
                height: 95px !important;
                font-size: 0.75rem;
                padding: 8px;
            }
            .small-circle.active {
                width: 110px !important;
                height: 110px !important;
            }
            .top-instructions {
                font-size: 0.9rem;
                top: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="learning-activity-container">
        <div class="top-instructions">
            Select a satellite circle to explore support options.
        </div>

        <div id="large-circle" class="large-circle">
            <div id="large-circle-content">
                <h2 id="large-circle-title">Internal Support</h2>
                <p id="large-circle-text">
                    If a colleague shares that they are experiencing violence, your workplace has specific tools to help them stay safe and keep their job.
                </p>
            </div>
        </div>

        <div id="small-circles-wrapper"></div>
    </div>

    <script>
        const sectionsData = [
            {
                id: 'managers',
                title: 'Managers',
                content: 'Managers can provide immediate practical support. They can arrange shift changes and secure priority parking.'
            },
            {
                id: 'eap',
                title: 'EAP',
                content: 'Our Employee Assistance Program (EAP) offers free, private, and professional counselling for all staff members needing emotional support.'
            },
            {
                id: 'hr',
                title: 'HR Support',
                content: 'HR can guide staff through entitlements. All Australian employees have access to 10 days of paid domestic violence leave annually.'
            }
        ];

        const largeCircleTitle = document.getElementById('large-circle-title');
        const largeCircleText = document.getElementById('large-circle-text');
        const wrapper = document.getElementById('small-circles-wrapper');
        const container = document.querySelector('.learning-activity-container');

        let activeCircleId = null;

        function renderCircles() {
            const isMobile = window.innerWidth <= 850;
            const centerX = container.offsetWidth / 2;
            const centerY = container.offsetHeight / 2;
            
            const largeCircleEl = document.getElementById('large-circle');
            const largeR = largeCircleEl.offsetWidth / 2;
            
            const activeIndex = sectionsData.findIndex(s => s.id === activeCircleId);

            sectionsData.forEach((section, index) => {
                const el = document.getElementById(`circle-${section.id}`);
                const isActive = section.id === activeCircleId;
                const currentRadius = el.offsetWidth / 2;
                
                // Increase orbit on mobile to clear the white center
                const padding = isMobile ? 35 : 30;
                const orbitRadius = largeR + currentRadius + padding;

                let targetAngle;
                if (isMobile) {
                    // Vertical arc positioning for mobile
                    const mobileAngles = [90, 210, 330];
                    targetAngle = mobileAngles[index];
                } else {
                    // Original side-arc for PC
                    const RIGHT_ARC_START = 45;
                    const LEFT_ARC_START = 135;
                    const STEP = 35;

                    if (activeIndex === -1) {
                        targetAngle = RIGHT_ARC_START - (index * STEP);
                    } else if (index <= activeIndex) {
                        targetAngle = LEFT_ARC_START + (index * STEP);
                    } else {
                        const relativeIndex = index - (activeIndex + 1);
                        targetAngle = RIGHT_ARC_START - (relativeIndex * STEP);
                    }
                }

                const rad = targetAngle * (Math.PI / 180);
                const x = centerX + orbitRadius * Math.cos(rad) - currentRadius;
                const y = centerY - orbitRadius * Math.sin(rad) - currentRadius;

                el.style.transform = `translate(${x}px, ${y}px)`;

                if (isActive) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        function handleCircleClick(id) {
            if (activeCircleId === id) return;
            activeCircleId = id;
            const section = sectionsData.find(s => s.id === id);
            largeCircleTitle.textContent = section.title;
            largeCircleText.textContent = section.content;
            renderCircles();
        }

        function init() {
            sectionsData.forEach(section => {
                const circle = document.createElement('div');
                circle.id = `circle-${section.id}`;
                circle.className = 'small-circle';
                circle.textContent = section.title;
                circle.addEventListener('click', () => handleCircleClick(section.id));
                wrapper.appendChild(circle);
            });
            setTimeout(renderCircles, 100);
            window.addEventListener('resize', renderCircles);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
